services:
  - type: web
    name: pyquest-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: bash render-start.sh
    healthCheckPath: /api/core/health
    envVars:
      - key: PORT
        value: '10000'
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: COMPILER_PROVIDER_URL
        sync: false
      - key: COMPILER_PROVIDER_API_KEY
        sync: false
      - key: COMPILER_PYTHON_LANGUAGE_ID
        value: '71'
